    <!-- Bootstrap JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>

    <script>
        // Project data
        const projects = [
            {
                id: 1,
                title: '單元 #1',
                description: '課程簡介、安裝 GitHub Pages 個人網站'
            },
            {
                id: 2,
                title: '單元 #2',
                description: 'Claude AI、Claude Cowork、Claude Code 應用'
            },
            {
                id: 3,
                title: '單元 #3',
                description: 'Skills 製作與設定、Claude Skills 應用'
            },
            {
                id: 4,
                title: '單元 #4',
                description: 'OpenAI Codex 與 AI 輔助程式開發'
            },
            {
                id: 5,
                title: '單元 #5',
                description: 'OpenAI 記憶、技能與外掛插件'
            },
            {
                id: 6,
                title: '單元 #6',
                description: 'Google Gemini Skills 與多模型應用'
            },
            {
                id: 7,
                title: '單元 #7',
                description: 'Google Flow 與 AI 影音生成工作流'
            },
            {
                id: 8,
                title: '單元 #8',
                description: 'N8N 工作流自動化'
            },
            {
                id: 9,
                title: '單元 #9',
                description: 'N8N 工作流自動化進階'
            },
            {
                id: 10,
                title: '單元 #10',
                description: '地端 Ollama、Cloudflare、Docker 整合'
            },
            {
                id: 11,
                title: '單元 #11',
                description: '地端 AI 整合 LINE、FB、WhatsApp 等通訊平台'
            },
            {
                id: 12,
                title: '單元 #12',
                description: '期末報告與 AI 專案成果展示'
            }
        ];

        // User Profile Data Section
        const profileData = {
            name: '陳彥宇',
            title1: '台科大 EMBA 114 級｜數位金融與 AI 應用學習者',
            title2: '永豐金證券數位金融處｜資深經理',
            expertise: '數位金融、AI 應用、流程自動化、金融科技、客戶經營與資料驅動決策',
            education: '國立臺灣科技大學 EMBA 管理研究所 114 級',
            email: '請透過課程平台或 GitHub Pages 作品頁聯繫',
            linkedin: '個人連結待補',
            about1: '我是陳彥宇，目前就讀國立臺灣科技大學 EMBA 管理研究所 114 級。<br>',
            about2: '工作上任職於永豐金證券數位金融處，長期關注數位金融、金融科技、AI 應用與客戶經營議題。<br>',
            about3: '這個網站是 2026 AI 課程的個人作品集，記錄我在生成式 AI、GitHub Pages、Codex、Claude Code、N8N、Ollama 與自動化工作流上的學習成果。<br>',
            about4: '我的目標是把 AI 工具導入實務場景，提升工作效率、資料分析能力與數位金融服務品質。',
            role: '永豐金證券數位金融處 資深經理',
            location: 'Taipei, Taiwan｜國立臺灣科技大學 EMBA'
        };

        // Initialize page
        document.addEventListener('DOMContentLoaded', function() {
            loadProfileData();
            renderProjects();
            initScrollAnimations();
            initSmoothScrolling();
        });

        // Load profile data
        function loadProfileData() {
            document.getElementById('name').textContent = profileData.name;
            document.getElementById('title1').textContent = profileData.title1;
            document.getElementById('title2').textContent = profileData.title2;
            document.getElementById('expertise').textContent = profileData.expertise;
            document.getElementById('education').textContent = profileData.education;

            const emailLink = document.getElementById('email');
            emailLink.textContent = profileData.email;
            emailLink.href = '#contact';

            const linkedinLink = document.getElementById('linkedin');
            const linkedinText = document.getElementById('linkedin-text');
            linkedinText.textContent = profileData.linkedin;
            linkedinLink.href = '#';
            linkedinLink.addEventListener('click', function(event) {
                event.preventDefault();
            });

            const aboutText = [
                profileData.about1,
                profileData.about2,
                profileData.about3,
                profileData.about4
            ]
                .filter(text => text && text.trim())
                .join(' ');

            document.getElementById('about-text').innerHTML = aboutText;

            const contactEmail = document.getElementById('contact-email1');
            contactEmail.textContent = profileData.email;
            contactEmail.href = '#contact';

            document.getElementById('contact-phone').textContent = profileData.role;
            document.getElementById('contact-location').innerHTML = profileData.location;
        }

        // Render projects
        function renderProjects() {
            const grid = document.getElementById('projects-grid');

            grid.innerHTML = projects.map(project => {
                return `
                    <div class="project-card" onclick="openProject(${project.id})">
                        <div class="project-number">${project.id}</div>
                        <h5>${project.title}</h5>
                        <p class="text-muted">${project.description}</p>
                        <small class="text-primary">點擊查看詳情</small>
                    </div>
                `;
            }).join('');
        }

        // Open project details
        function openProject(id) {
            window.open(`unit.html?unit=${id}`, '_blank');
        }

        // Scroll animations
        function initScrollAnimations() {
            const observerOptions = {
                threshold: 0.1,
                rootMargin: '0px 0px -50px 0px'
            };

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                    }
                });
            }, observerOptions);

            document.querySelectorAll('.fade-in').forEach(el => {
                observer.observe(el);
            });
        }

        // Smooth scrolling for navigation links
        function initSmoothScrolling() {
            document.querySelectorAll('a[href^="#"]').forEach(anchor => {
                anchor.addEventListener('click', function(e) {
                    const href = this.getAttribute('href');

                    if (href === '#') {
                        return;
                    }

                    e.preventDefault();

                    const target = document.querySelector(href);

                    if (target) {
                        const headerOffset = 70;
                        const elementPosition = target.getBoundingClientRect().top;
                        const offsetPosition = elementPosition + window.pageYOffset - headerOffset;

                        window.scrollTo({
                            top: offsetPosition,
                            behavior: 'smooth'
                        });
                    }
                });
            });
        }

        // Navbar background on scroll
        window.addEventListener('scroll', function() {
            const navbar = document.querySelector('.navbar');

            if (window.scrollY > 50) {
                navbar.style.background = 'rgba(255,255,255,0.98)';
            } else {
                navbar.style.background = 'rgba(255,255,255,0.95)';
            }
        });
    </script>
